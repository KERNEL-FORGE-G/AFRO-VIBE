<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Afro Vibe — Admin Dashboard (Local)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d14;
      --card: #15151f;
      --card2: #1c1c2a;
      --border: rgba(255,255,255,0.07);
      --primary: #8b5cf6;
      --accent: #f59e0b;
      --red: #ef4444;
      --green: #10b981;
      --blue: #3b82f6;
      --text: #f1f5f9;
      --muted: #64748b;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
      background: var(--card); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 24px 16px;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; padding: 0 8px; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
    .logo-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      color: var(--muted); font-size: 13px; font-weight: 500;
      transition: all 0.2s; margin-bottom: 2px; text-decoration: none;
    }
    .nav-item:hover, .nav-item.active { background: rgba(139,92,246,0.12); color: var(--text); }
    .nav-item.active { border-left: 2px solid var(--primary); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); margin-left: auto; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Main ── */
    .main { margin-left: 220px; padding: 28px; min-height: 100vh; }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px;
    }
    .topbar h1 { font-size: 22px; font-weight: 700; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .badge {
      padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
      background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3);
    }
    .sync-btn {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      background: var(--blue); color: white; border: none; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
    }
    .sync-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .refresh-btn {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      background: var(--primary); color: white; border: none; cursor: pointer;
    }

    /* ── Stats Grid ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px;
    }
    .stat-icon { font-size: 22px; margin-bottom: 12px; }
    .stat-value { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; }

    /* ── Tables ── */
    .section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .section-title { font-size: 14px; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; padding: 10px 20px; text-align: left; background: var(--card2); }
    td { font-size: 13px; padding: 12px 20px; border-top: 1px solid var(--border); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; margin-right: 10px; }
    .user-cell { display: flex; align-items: center; }
    .delete-btn { padding: 4px 10px; border-radius: 6px; font-size: 11px; color: var(--red); background: rgba(239,68,68,0.1); border: 1px solid var(--red); cursor: pointer; }

    /* ── Info ── */
    .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .info-key { color: var(--muted); }
    .copy-btn { font-size: 11px; padding: 2px 8px; border-radius: 4px; cursor: pointer; background: rgba(245,158,11,0.1); color: var(--accent); border: 1px solid var(--accent); }

    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; display: none; z-index: 1000; color: white; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">🎵</div>
    <div><div class="logo-text">AFRO VIBE</div><div class="logo-sub">Admin Panel (Local)</div></div>
  </div>
  <a class="nav-item active" onclick="showTab('dashboard')"><span class="nav-icon">📊</span>Dashboard</a>
  <a class="nav-item" onclick="showTab('users')"><span class="nav-icon">👥</span>Utilisateurs</a>
  <a class="nav-item" onclick="showTab('videos')"><span class="nav-icon">🎬</span>Vidéos</a>
  <a class="nav-item" onclick="showTab('server')"><span class="nav-icon">⚙️</span>Serveur</a>
</aside>

<main class="main">
  <div class="topbar">
    <h1 id="page-title">Dashboard</h1>
    <div class="topbar-right">
      <button class="sync-btn" id="sync-btn" onclick="syncCloud()">☁️ Synchroniser avec le Cloud</button>
      <button class="refresh-btn" onclick="loadAll()">⟳ Actualiser</button>
    </div>
  </div>

  <div id="tab-dashboard">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value" id="stat-users">—</div><div class="stat-label">Utilisateurs (Local)</div></div>
      <div class="stat-card"><div class="stat-icon">🎬</div><div class="stat-value" id="stat-videos">—</div><div class="stat-label">Vidéos (Local)</div></div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-title">👥 Utilisateurs récents</span></div>
      <table><tbody id="table-users-dash"></tbody></table>
    </div>
  </div>

  <div id="tab-users" style="display:none">
    <div class="section"><table><thead><tr><th>Utilisateur</th><th>Email</th><th>Action</th></tr></thead><tbody id="table-users-full"></tbody></table></div>
  </div>

  <div id="tab-videos" style="display:none">
    <div class="section"><table><thead><tr><th>Vidéo</th><th>Créateur</th><th>Action</th></tr></thead><tbody id="table-videos-full"></tbody></table></div>
  </div>

  <div id="tab-server" style="display:none">
    <div class="section">
      <div style="padding: 16px 20px">
        <div class="info-row"><span class="info-key">Base de données</span><span class="info-val">SQLite (Local)</span></div>
        <div class="info-row"><span class="info-key">URL Sync</span><span class="info-val">Supabase Online</span></div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  async function loadAll() {
    loadUsers();
    loadVideos();
  }

  async function loadUsers() {
    const res = await fetch('/api/users');
    const users = await res.json();
    document.getElementById('stat-users').textContent = users.length;
    const rows = users.map(u => `<tr><td><div class="user-cell"><div class="avatar">U</div>${u.username}</div></td><td>${u.email}</td><td><button class="delete-btn">Supprimer</button></td></tr>`).join('');
    document.getElementById('table-users-dash').innerHTML = rows;
    document.getElementById('table-users-full').innerHTML = rows;
  }

  async function loadVideos() {
    const res = await fetch('/api/videos');
    const videos = await res.json();
    document.getElementById('stat-videos').textContent = videos.length;
    const rows = videos.map(v => `<tr><td>Vidéo #${v.id.slice(0,5)}</td><td>${v.user_id}</td><td><button class="delete-btn">Supprimer</button></td></tr>`).join('');
    document.getElementById('table-videos-full').innerHTML = rows;
  }

  async function syncCloud() {
    const btn = document.getElementById('sync-btn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Synchronisation...';
    try {
      const res = await fetch('/api/sync', { method: 'POST' });
      const data = await res.json();
      if (data.success) {
        showToast(`✅ Synchro réussie: ${data.results.users} utilisateurs, ${data.results.videos} vidéos.`);
      } else {
        showToast('❌ Erreur: ' + data.error, true);
      }
    } catch(e) {
      showToast('❌ Erreur réseau', true);
    }
    btn.disabled = false;
    btn.innerHTML = '☁️ Synchroniser avec le Cloud';
  }

  function showToast(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isError ? '#ef4444' : '#10b981';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 5000);
  }

  function showTab(name) {
    ['dashboard','users','videos','server'].forEach(t => document.getElementById('tab-'+t).style.display = t === name ? 'block' : 'none');
  }

  loadAll();
</script>
</body>
</html>
